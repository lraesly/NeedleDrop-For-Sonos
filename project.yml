name: NeedleDrop
options:
  bundleIdPrefix: com.needledrop
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"
settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
packages:
  SwiftUPnP:
    path: LocalPackages/SwiftUPnP
targets:
  NeedleDrop:
    type: application
    platform: macOS
    sources:
      - NeedleDrop
    settings:
      INFOPLIST_FILE: NeedleDrop/Info.plist
      CODE_SIGN_ENTITLEMENTS: NeedleDrop/NeedleDrop.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: com.needledrop.app
      PRODUCT_NAME: NeedleDrop
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ENABLE_HARDENED_RUNTIME: NO
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGNING_REQUIRED: NO
      DEVELOPMENT_TEAM: A52FG8L4Z8
      ENABLE_PREVIEWS: YES
    dependencies:
      - package: SwiftUPnP
